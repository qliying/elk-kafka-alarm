input {
  kafka {
    bootstrap_servers => "kafka1:9092,kafka2:9092,kafka3:9092"  # 你的Kafka集群地址
    topics => ["nginx-log"]                                      # 你的Kafka主题，和你现有配置一致
    group_id => "logstash-nginx-group"                           # 消费组ID，自定义
    codec => json { charset => "UTF-8" }
  }
}

filter {
  # 解析Filebeat发送的Nginx日志（适配你的日志格式）
  grok {
    match => { "message" => "%{IPORHOST:client_ip} - - \[%{HTTPDATE:timestamp}\] \"%{WORD:method} %{URIPATH:path} HTTP/%{NUMBER:http_version}\" %{NUMBER:status:int} %{NUMBER:body_bytes_sent:int} \"%{DATA:referrer}\" \"%{DATA:user_agent}\"" }
  }
  # 转换时间格式，适配Elasticsearch
  date {
    match => [ "timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://kafka1:9201"]  # 你的Elasticsearch地址
    index => "nginx-logs-%{+YYYY.MM.dd}"  # 按日期分索引，方便管理
    action => "index"
  }
  # 可选：同时输出到控制台，方便调试
  stdout { codec => rubydebug }
}
